<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ollama :: session</title>
<style>
  :root {
    --bg: #0b0f0d;
    --panel: #0f1512;
    --line: #1c2a22;
    --text: #c9f0d6;
    --dim: #5f8a70;
    --accent: #38f28a;
    --error: #ff6b6b;
    --font-mono: "IBM Plex Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Title bar */
  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f56; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #27c93f; }
  .titlebar span.label {
    margin-left: 8px;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.04em;
  }

  /* Connection bar: model + key entry */
  .connbar {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }
  .connbar label {
    color: var(--dim);
    font-size: 12px;
    white-space: nowrap;
  }
  .connbar input, .connbar select {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
  }
  .connbar input:focus, .connbar select:focus { border-color: var(--accent); }
  #apiKey { flex: 1; min-width: 180px; }
  .connbar button {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
  }
  .connbar button:hover { background: rgba(56, 242, 138, 0.1); }
  .status-pill {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid var(--line);
    color: var(--dim);
  }
  .status-pill.online { color: var(--accent); border-color: var(--accent); }
  .status-pill.error { color: var(--error); border-color: var(--error); }

  /* Console log */
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .line { margin-bottom: 10px; }
  .prefix { color: var(--dim); }
  .prefix.sys { color: var(--dim); }
  .prefix.user { color: var(--accent); }
  .prefix.assistant { color: #7db9ff; }
  .prefix.error { color: var(--error); }
  .content { color: var(--text); }
  .content.sys { color: var(--dim); font-style: italic; }
  .content.error { color: var(--error); }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    animation: blink 1s step-start infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Input row */
  .inputrow {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
    background: var(--panel);
    flex-shrink: 0;
  }
  .inputrow .arrow { color: var(--accent); }
  #prompt {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
  }
  #sendBtn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
  }
  #sendBtn:hover { border-color: var(--accent); color: var(--accent); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="label">ollama-cloud // interactive session</span>
  </div>

  <div class="connbar">
    <label for="modelSelect">model</label>
    <select id="modelSelect">
      <option value="glm-5.2:cloud">glm-5.2:cloud</option>
      <option value="kimi-k2.7-code:cloud">kimi-k2.7-code:cloud</option>
      <option value="minimax-m3:cloud">minimax-m3:cloud</option>
      <option value="nemotron-3-super:cloud">nemotron-3-super:cloud</option>
    </select>
    <button id="connectBtn">connect</button>
    <span id="statusPill" class="status-pill">not connected</span>
  </div>

  <div id="log">
<div class="line"><span class="prefix sys">[system]</span> <span class="content sys">session initialized. this page talks to your local proxy server, not ollama.com directly — the API key lives in the proxy's environment, not in this page. start the proxy (see server.js), then click "connect".</span></div>
  </div>

  <div class="inputrow">
    <span class="arrow">&gt;</span>
    <input id="prompt" type="text" placeholder="type a message and press enter..." autocomplete="off" disabled>
    <button id="sendBtn" disabled>send</button>
  </div>

<script>
/*
  ── HOW THIS TALKS TO OLLAMA CLOUD ──────────────────────────────────────
  This page never contacts ollama.com directly. It POSTs to your own
  local proxy server (see server.js) at http://localhost:3787/api/chat.
  The proxy holds OLLAMA_API_KEY as a server-side environment variable
  and forwards the request to https://ollama.com/api/chat, attaching the
  Authorization header itself. That means:
    - no CORS issues (browser <-> localhost is same-origin friendly, and
      the proxy sends its own CORS headers anyway)
    - the API key never appears in browser code, devtools, or view-source

  Start the proxy first:
    cd ollama-proxy
    npm install
    export OLLAMA_API_KEY=your_api_key_here
    npm start
  Then open this HTML file in a browser.
*/

const PROXY_ENDPOINT = "http://localhost:3787/api/chat";

const logEl = document.getElementById("log");
const modelEl = document.getElementById("modelSelect");
const connectBtn = document.getElementById("connectBtn");
const statusPill = document.getElementById("statusPill");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("sendBtn");

let conversation = [];
let connected = false;

function appendLine(prefix, content, kind) {
  const div = document.createElement("div");
  div.className = "line";
  div.innerHTML =
    `<span class="prefix ${kind}">[${prefix}]</span> <span class="content ${kind}">${escapeHtml(content)}</span>`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  return div;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.innerText = str;
  return d.innerHTML;
}

function setStatus(text, state) {
  statusPill.textContent = text;
  statusPill.className = "status-pill" + (state ? " " + state : "");
}

connectBtn.addEventListener("click", async () => {
  setStatus("connecting...", "");
  appendLine("system", `attempting connection to proxy at ${PROXY_ENDPOINT} with model "${modelEl.value}"...`, "sys");

  try {
    // Lightweight handshake: send a trivial message to confirm the proxy + model work.
    const res = await fetch(PROXY_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: modelEl.value,
        messages: [{ role: "user", content: "ping" }],
        stream: false
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errText}`);
    }

    connected = true;
    setStatus("online", "online");
    promptEl.disabled = false;
    sendBtn.disabled = false;
    appendLine("system", "connected. model is ready.", "sys");
  } catch (err) {
    connected = false;
    setStatus("connection failed", "error");
    appendLine("error", `${err.message} (is the proxy server running? try: npm start)`, "error");
  }
});

async function sendMessage() {
  const text = promptEl.value.trim();
  if (!text || !connected) return;

  appendLine("user", text, "user");
  conversation.push({ role: "user", content: text });
  promptEl.value = "";
  sendBtn.disabled = true;

  const thinkingLine = appendLine("assistant", "thinking...", "assistant");

  try {
    const res = await fetch(PROXY_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: modelEl.value,
        messages: conversation,
        stream: false
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errText}`);
    }

    const data = await res.json();
    const reply = data.message && data.message.content ? data.message.content : "(empty response)";
    conversation.push({ role: "assistant", content: reply });

    thinkingLine.querySelector(".content").textContent = reply;
  } catch (err) {
    thinkingLine.remove();
    appendLine("error", err.message, "error");
  } finally {
    sendBtn.disabled = false;
    promptEl.focus();
  }
}

sendBtn.addEventListener("click", sendMessage);
promptEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
